# Render blueprint. Deploy: render.com -> New + -> Blueprint -> pick this repo.
# Data is stored in PostgreSQL: create a free database at neon.tech and paste its
# connection string into the DATABASE_URL value (Render will prompt you, since it's
# marked sync:false). No persistent disk or paid plan required for the database.
services:
  - type: web
    name: sailone-crm
    runtime: node
    plan: free               # bump to "starter" if you need 24/7 on-time reminders.
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true   # Render creates a strong random secret for you.
      - key: DATABASE_URL
        sync: false           # paste your Neon/Supabase Postgres connection string.
      - key: ANTHROPIC_API_KEY
        sync: false           # for "Talk to add a lead" (console.anthropic.com).
      # Fill these when you're ready (leave blank for now):
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
